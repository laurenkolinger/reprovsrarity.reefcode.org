project:
  type: website
  output-dir: docs
  resources:
    - CNAME
    - data/downloads        # original imported datasets, clipped to each analysis year range, + metadata
  render:
    - qmd/00_overview.qmd
    - qmd/aspublished/02_tcrmp.qmd
    - qmd/aspublished/03_vinps.qmd
    - qmd/aspublished/04_csun.qmd
    - qmd/aspublished/05_octocoral.qmd
    - qmd/updated/02_tcrmp.qmd
    - qmd/updated/03_vinps.qmd
    - qmd/updated/04_csun.qmd
    - qmd/updated/05_octocoral.qmd
    - qmd/06_interactive.qmd
    - qmd/07_manuscript_values.qmd

website:
  title: "Reproductive mode and rarity"

format:
  reefcode-html:
    include-before-body: _nav.html
    date: today                     # programmatic "Last updated" stamp, resolved at render
    date-format: "MMMM D, YYYY"
    published-title: "Last updated"
    fontsize: 12px                  # repo-level override: smaller body text (theme default ~17.6px)
    css: assets/reefcode-local.css  # centered column + margin + capped figures (theme is full-width)

# Shared bibliography and Science CSL (paths relative to the project root). Every page can
# resolve [@key] citations against these; a References section renders where citations appear.
bibliography: references.bib
csl: science.csl

execute:
  freeze: auto
  warning: false
  message: false
